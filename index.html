<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <!-- <nav>

        </nav> -->
        <section class="allElems">
            <div class="todo elem" id="0">
                <img src="assets/To_do_list.avif" alt="To_do_list">
                <h2>To Do List</h2>
            </div>
            <div class="daily elem" id="1">
                <img src="/assets/Planner.avif" alt="Planner">
                <h2>Daily Planner</h2>
            </div>
            <div class="motiv elem" id="2">
                <img src="/assets/Motivation.avif" alt="Motivation">
                <h2>Motivation</h2>
            </div>
            <div class="pomo elem" id="3">
                <img src="/assets/Pomodoro.avif" alt="Pomodoro">
                <h2>Pomodoro Timer</h2>
            </div>
            <div class="goals elem" id="4">
                <img src="assets/Daily_goals.avif" alt="Goals">
                <h2>Daily Goals</h2>
            </div>
        </section>

        <section class="fullElem">
            <button class="back" id="0">Close</button>
            <h1>To do Page</h1>
        </section>
        <section class="fullElem">
            <button class="back" id="1">Close</button>
            <h1>Daily Planner</h1>
        </section>
        <section class="fullElem">
            <button class="back" id="2">Close</button>
            <h1>Motivation Quote</h1>
        </section>
        <section class="fullElem">
            <button class="back" id="3">Close</button>
            <h1>Pomodoro Timer</h1>
        </section>
        <section class="fullElem">
            <button class="back" id="4">Close</button>
            <h1>Daily Goals</h1>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
